{% extends "base.html" %}
{% load i18n %}

{% block content %}

<div class="row justify-content-center">
<div class="col-md-5">
<div class="page-panel text-center">
<i class="bi bi-envelope-check" style="font-size:3rem;color:var(--accent);"></i>
<h1 class="mt-3 mb-2">{% translate "Check your email" %}</h1>
<p class="muted-text mb-4">{% translate "If an account exists for that address, we've sent a password reset link. Check your inbox (and spam folder)." %}</p>
<a class="btn btn-outline-secondary" href="{% url 'login' %}">{% translate "Back to login" %}</a>
</div>
</div>
</div>

{% endblock %}
