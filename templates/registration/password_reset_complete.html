{% extends "base.html" %}
{% load i18n %}

{% block content %}

<div class="row justify-content-center">
<div class="col-md-5">
<div class="page-panel text-center">
<i class="bi bi-check-circle" style="font-size:3rem;color:#198754;"></i>
<h1 class="mt-3 mb-2">{% translate "Password changed" %}</h1>
<p class="muted-text mb-4">{% translate "Your password has been set. You can now log in with your new password." %}</p>
<a class="btn btn-primary" href="{% url 'login' %}">{% translate "Log in" %}</a>
</div>
</div>
</div>

{% endblock %}
